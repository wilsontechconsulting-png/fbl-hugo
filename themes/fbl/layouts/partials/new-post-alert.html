{{ $blogPages := where .Site.Pages "Type" "blog" }}
{{ $blogPages := where $blogPages "Kind" "page" }}
{{ $newestPost := index $blogPages 0 }}

{{ with $newestPost }}
<div class="new-post-alert">
  <div class="container">
    <div class="alert-content">
      <div class="alert-badge">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
          <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
        </svg>
        New Post
      </div>
      <a href="{{ .Permalink }}" class="alert-link">
        <span class="alert-title">{{ .Title }}</span>
        <span class="alert-arrow">Read Now →</span>
      </a>
      {{ with .Params.categories }}
      <span class="alert-category">{{ index . 0 }}</span>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
