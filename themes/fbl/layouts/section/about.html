{{ define "main" }}
<article class="content-page">
    <!-- New Post Alert -->
    {{ partial "new-post-alert.html" . }}
    
    <section class="page-hero">
        <div class="container">
            <div class="section-badge">Our Story</div>
            <h1>About <span class="text-accent">FBL</span></h1>
            {{ if .Description }}
            <p class="page-subtitle">{{ .Description }}</p>
            {{ end }}
        </div>
    </section>

    <section class="page-content">
        <div class="container">
            <div class="content-wrapper">
                {{ .Content }}
            </div>
        </div>
    </section>
</article>
{{ end }}
